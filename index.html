<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skateboard Rank Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="viewport" id="viewport">
    <canvas id="lineCanvas"></canvas>
    <div class="tree" id="tree">

      <!-- Col 0 -->
      <div class="node unlocked" id="ollie" style="left:35px; top:425px;" data-title="Ollie" data-desc="The foundation of almost every skateboard trick. Master this first.">Ollie</div>

      <!-- Col 1 -->
      <div class="node" id="heelflip"  style="left:315px; top:35px;"  data-title="Heelflip"     data-desc="Use your heel to flip the board."                    data-parents="ollie">Heelflip</div>
      <div class="node" id="kickflip"  style="left:315px; top:230px;" data-title="Kickflip"     data-desc="Flick your front foot to spin the board."            data-parents="ollie">Kickflip</div>
      <div class="node" id="popshuvit" style="left:315px; top:425px;" data-title="Pop Shuv-it"  data-desc="Scoop the board 180° without flipping."              data-parents="ollie">Pop Shuv-it</div>
      <div class="node" id="fs180"     style="left:315px; top:620px;" data-title="Frontside 180" data-desc="Ollie rotating 180° frontside."                   data-parents="ollie">FS 180</div>
      <div class="node" id="bs180"     style="left:315px; top:815px;" data-title="Backside 180" data-desc="Ollie rotating 180° backside."                      data-parents="ollie">BS 180</div>

      <!-- Col 2 -->
      <div class="node" id="varialheelflip" style="left:595px; top:35px;"  data-title="Varial Heelflip" data-desc="Frontside shove-it and heelflip combined."   data-parents="heelflip">Varial Heel</div>
      <div class="node" id="varialkickflip" style="left:595px; top:230px;" data-title="Varial Kickflip" data-desc="Backside shove-it and kickflip combined."    data-parents="kickflip">Varial Flip</div>
      <div class="node" id="360shuvit"      style="left:595px; top:425px;" data-title="360 Shove-it"    data-desc="Scoop the board a full 360°."                data-parents="popshuvit">360 Shuv-it</div>
      <div class="node" id="fs360"          style="left:595px; top:620px;" data-title="Frontside 360"   data-desc="A full 360° frontside rotation."             data-parents="fs180">FS 360</div>
      <div class="node" id="bs360"          style="left:595px; top:815px;" data-title="Backside 360"    data-desc="A full 360° backside rotation."              data-parents="bs180">BS 360</div>

      <!-- Col 3 -->
      <div class="node" id="inwardheel"  style="left:875px; top:35px;"  data-title="Inward Heel"   data-desc="Backside shove-it combined with a heelflip."    data-parents="varialheelflip">Inward Heel</div>
      <div class="node" id="treflip"     style="left:875px; top:230px;" data-title="Tre Flip"      data-desc="360 shove-it and kickflip combined."            data-parents="varialkickflip">Tre Flip</div>
      <div class="node" id="fsflip"      style="left:875px; top:620px;" data-title="FS Flip"       data-desc="Frontside 180 with a kickflip."                 data-parents="fs360">FS Flip</div>
      <div class="node" id="bsheelflip"  style="left:875px; top:815px;" data-title="BS Heelflip"   data-desc="Backside 180 with a heelflip."                  data-parents="bs360">BS Heelflip</div>

      <!-- Col 4 -->
      <div class="node" id="hardflip"   style="left:1155px; top:230px;" data-title="Hardflip"     data-desc="Frontside shove-it combined with a kickflip."   data-parents="treflip">Hardflip</div>
      <div class="node" id="fsheelflip" style="left:1155px; top:620px;" data-title="FS Heelflip"  data-desc="Frontside 180 with a heelflip."                 data-parents="fsflip">FS Heelflip</div>
      <div class="node" id="bsflip"     style="left:1155px; top:815px;" data-title="BS Flip"      data-desc="Backside 180 with a kickflip."                  data-parents="bsheelflip">BS Flip</div>

    </div>
  </div>

  <!-- Popup -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <button class="popup-close" id="popupClose">✕</button>
      <h2 class="popup-title" id="popupTitle"></h2>
      <p class="popup-desc" id="popupDesc"></p>
      <button class="popup-complete" id="popupComplete">Mark as Complete ✓</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
