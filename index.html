<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skateboard Rank Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="viewport" id="viewport">
    <canvas id="lineCanvas"></canvas>
    <div class="tree" id="tree">

      <!-- Col 0: Ollie -->
      <div class="col" id="col0">
        <div class="node unlocked" id="ollie" data-title="Ollie" data-desc="The foundation of almost every skateboard trick. Master this first.">Ollie</div>
      </div>

      <!-- Col 1: Level 2 tricks -->
      <div class="col" id="col1">
        <div class="node locked" id="heelflip" data-title="Heelflip" data-desc="Use your heel to flip the board." data-parents="ollie">Heelflip</div>
        <div class="node locked" id="kickflip" data-title="Kickflip" data-desc="Flick your front foot to spin the board." data-parents="ollie">Kickflip</div>
        <div class="node locked" id="popshuvit" data-title="Pop Shove-it" data-desc="Scoop the board 180° without flipping." data-parents="ollie">Pop Shuv-it</div>
        <div class="node locked" id="fs180" data-title="Frontside 180" data-desc="Ollie rotating 180° frontside." data-parents="ollie">FS 180</div>
        <div class="node locked" id="bs180" data-title="Backside 180" data-desc="Ollie rotating 180° backside." data-parents="ollie">BS 180</div>
      </div>

      <!-- Col 2: Level 3 tricks -->
      <div class="col" id="col2">
        <div class="node locked" id="inwardheel" data-title="Inward Heel" data-desc="Backside shove-it combined with a heelflip." data-parents="heelflip">Inward Heel</div>
        <div class="node locked" id="varialheelflip" data-title="Varial Heelflip" data-desc="Frontside shove-it and heelflip at the same time." data-parents="heelflip">Varial Heel</div>
        <div class="node locked" id="varialkickflip" data-title="Varial Kickflip" data-desc="Backside shove-it and kickflip at the same time." data-parents="kickflip">Varial Flip</div>
        <div class="node locked" id="360shuvit" data-title="360 Pop Shove-it" data-desc="Scoop the board a full 360°." data-parents="popshuvit">360 Shuv-it</div>
        <div class="node locked" id="fs360" data-title="Frontside 360" data-desc="A full 360° frontside rotation." data-parents="fs180">FS 360</div>
        <div class="node locked" id="bs360" data-title="Backside 360" data-desc="A full 360° backside rotation." data-parents="bs180">BS 360</div>
      </div>

    </div>
  </div>

  <!-- Popup -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <button class="popup-close" id="popupClose">✕</button>
      <h2 class="popup-title" id="popupTitle"></h2>
      <p class="popup-desc" id="popupDesc"></p>
      <button class="popup-complete" id="popupComplete">Mark as Complete ✓</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
