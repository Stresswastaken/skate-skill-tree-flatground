<!DOCTYPE html>
<html>
  <head>
    <title>Skate Skill Tree</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Flatground Skill Tree</h1>
    <div class="tree">
      <div class="level">
        <div class="node" id="ollie">
          <img src="ollie.png" alt="Ollie">
          <p>Ollie</p>
        </div>
      </div>
      <div class="level">
        <div class="node locked" id="kickflip"><img src="kickflip.png" alt="Kickflip"><p>Kickflip</p></div>
        <div class="node locked" id="heelflip"><img src="heelflip.png" alt="Heelflip"><p>Heelflip</p></div>
        <div class="node locked" id="popshuvit"><img src="popshuvit.png" alt="Pop Shove-it"><p>Pop Shove-it</p></div>
        <div class="node locked" id="fs180"><img src="fs180.png" alt="Frontside 180"><p>Frontside 180</p></div>
        <div class="node locked" id="bs180"><img src="bs180.png" alt="Backside 180"><p>Backside 180</p></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
